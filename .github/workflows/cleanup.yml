name: Limpiar artefactos antiguos

on:
  schedule:
    - cron: '0 4 * * 0'   # Cada domingo a las 04:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write          # Permiso necesario para borrar artefactos
    steps:
      - name: Eliminar artefactos antiguos
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '7 days'       # Borra los que tengan más de 7 días
          skip-tags: true     # No borra artefactos de releases
          skip-recent: 3      # Conserva los 3 más recientes