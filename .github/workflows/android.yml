name: Build Android (MAUI)

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # ... (el resto de pasos hasta compilar son idénticos a los tuyos) ...

    # 🔨 COMPILAR (genera el APK)
    - name: Compilar APK Firmado
      run: |
        dotnet publish POPSManager.Android/POPSManager.Android.csproj `
          -c Release `
          -f net8.0-android `
          -p:RuntimeIdentifier=android-arm64 `
          /p:AndroidPackageFormat=apk `
          /p:AndroidKeyStore=true `
          /p:AndroidSigningKeyStore="$keystore" `
          /p:AndroidSigningKeyAlias=$env:KEY_ALIAS `
          /p:AndroidSigningKeyPass=$env:KEY_PASSWORD `
          /p:AndroidSigningStorePass=$env:KEYSTORE_PASSWORD
      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

    # 📁 COPIAR APK A CARPETA publish (comprimiendo para reducir tamaño)
    - name: Copiar y comprimir APK
      run: |
        New-Item -ItemType Directory -Force -Path publish
        $apk = Get-ChildItem -Path "POPSManager.Android\bin\Release\net8.0-android" -Filter "*.apk" -Recurse | Select-Object -First 1
        if ($apk) {
          # Comprimir el APK antes de subirlo (reduce el tamaño a la mitad aproximadamente)
          Compress-Archive -Path $apk.FullName -DestinationPath "publish\POPSManager-Android.zip"
          Write-Host "APK comprimido: publish\POPSManager-Android.zip"
        } else {
          Write-Host "No se encontró ningún APK."
        }
      shell: pwsh

    # 📦 SUBIR APK COMO ARTEFACTO (solo 3 días de retención, sin subir en push)
    - name: Subir artefacto APK
      if: github.event_name == 'workflow_dispatch'  # Solo en ejecuciones manuales
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-Android-Signed
        path: publish/POPSManager-Android.zip
        retention-days: 3          # Se borrará automáticamente después de 3 días
        if-no-files-found: warn
        compression-level: 6

    # 🚀 CREAR RELEASE solo en workflow_dispatch (manual) o cuando se crea un tag
    - name: Crear Release y subir APK
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "Android Build v${{ github.run_number }}"
        files: publish/POPSManager-Android.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}