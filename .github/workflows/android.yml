name: Build Android (MAUI)

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    # 📥 Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 🧹 LIMPIEZA TOTAL (evita bugs de cache)
    - name: Clean repo (hard)
      run: |
        git clean -fdx

    # 🔧 .NET 8 (FORZADO, evita .NET 10)
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.100

    # ☕ Java 17 (necesario para Android)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    # 📦 MAUI + Android
    - name: Install MAUI workloads
      run: |
        dotnet workload install maui android

    # 🧼 Limpiar NuGet
    - name: Clear NuGet cache
      run: dotnet nuget locals all --clear

    # 🔄 Restore
    - name: Restore
      run: dotnet restore POPSManager.sln

    # 🔐 Decodificar Keystore
    - name: Decode Keystore
      shell: pwsh
      run: |
        $bytes = [System.Convert]::FromBase64String($env:KEYSTORE_BASE64)
        $keystorePath = Join-Path $env:GITHUB_WORKSPACE "popsmanager.keystore"
        [System.IO.File]::WriteAllBytes($keystorePath, $bytes)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    # 🔨 BUILD APK (CLAVE)
    - name: Publish APK
      shell: pwsh
      run: |
        $keystorePath = Join-Path $env:GITHUB_WORKSPACE "popsmanager.keystore"

        dotnet publish POPSManager.Android/POPSManager.Android.csproj `
          -c Release `
          -f net8.0-android `
          -p:RuntimeIdentifier=android-arm64 `
          -p:AndroidPackageFormat=apk `
          -p:BuildApk=true `
          -p:AndroidKeyStore=true `
          -p:AndroidSigningKeyStore="$keystorePath" `
          -p:AndroidSigningKeyAlias=$env:KEY_ALIAS `
          -p:AndroidSigningKeyPass=$env:KEY_PASSWORD `
          -p:AndroidSigningStorePass=$env:KEYSTORE_PASSWORD `
          -p:AndroidManifest=Platforms\Android\AndroidManifest.xml

      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

    # 🔍 Buscar APK
    - name: Find APK
      shell: pwsh
      run: |
        Write-Host "Buscando APK..."
        Get-ChildItem -Recurse -Filter *.apk | ForEach-Object {
          Write-Host "APK encontrado: $($_.FullName)"
        }

    # 📁 Copiar APK
    - name: Copy APK
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path publish
        $apk = Get-ChildItem -Recurse -Filter *.apk | Select-Object -First 1

        if ($apk) {
          Copy-Item $apk.FullName publish\
          Write-Host "APK copiado: $($apk.FullName)"
        } else {
          throw "❌ APK no encontrado"
        }

    # 📦 Subir artefacto
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-APK
        path: publish/**/*.apk

    # 🚀 Crear Release
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "Build v${{ github.run_number }}"
        files: publish/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}