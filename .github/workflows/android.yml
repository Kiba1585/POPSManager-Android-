name: Build Android (MAUI)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🔥 Eliminar .NET 10 preinstalado (causa NETSDK1202)
    - name: Remove preinstalled .NET
      run: |
        Remove-Item -Recurse -Force "C:\Program Files\dotnet"
      shell: pwsh

    # ✔ Instalar .NET 8 limpio
    - name: Install .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # ✔ Instalar MAUI workload
    - name: Install MAUI workload
      run: dotnet workload install maui

    # ✔ Restaurar proyectos
    - name: Restore solution
      run: dotnet restore POPSManager.sln

    # 🔐 Decodificar keystore desde secreto Base64
    - name: Decode keystore
      run: |
        echo "$env:KEYSTORE_BASE64" | base64 -d > popsmanager.keystore
      shell: pwsh

    # 🔨 Compilar y firmar APK
    - name: Build Signed APK
      run: |
        dotnet publish POPSManager.Android/POPSManager.Android.csproj `
          -c Release `
          -f net8.0-android `
          /p:AndroidKeyStore=true `
          /p:AndroidSigningKeyStore=popsmanager.keystore `
          /p:AndroidSigningKeyAlias=$env:KEY_ALIAS `
          /p:AndroidSigningKeyPass=$env:KEY_PASSWORD `
          /p:AndroidSigningStorePass=$env:KEYSTORE_PASSWORD `
          --output ./publish

    # 📦 Subir APK firmado
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-Android-Signed
        path: publish/*.apk
