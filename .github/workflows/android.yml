name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest   # o windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET (si es MAUI / Xamarin)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java (necesario para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Configurar Android SDK
        shell: pwsh
        run: |
          $sdkRoot = "C:\Android\android-sdk"

          # Eliminar enlace simbólico roto si existe
          if (Test-Path $sdkRoot -PathType Container) {
              $item = Get-Item $sdkRoot -Force
              if ($item.Attributes -band [System.IO.FileAttributes]::ReparsePoint) {
                  Write-Host "Eliminando enlace simbólico roto en $sdkRoot"
                  Remove-Item -LiteralPath $sdkRoot -Force -Recurse -ErrorAction SilentlyContinue
              }
          }

          # Crear directorio real
          New-Item -ItemType Directory -Force -Path $sdkRoot

          # Descargar command-line tools
          $zipUrl = "https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip"
          $zipPath = "$env:TEMP\cmdline-tools.zip"
          $extractPath = "$env:TEMP\cmdline-tools-extract"

          Write-Host "Descargando Android SDK command-line tools desde $zipUrl..."
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath

          Write-Host "Extrayendo..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Mostrar estructura extraída (para diagnóstico)
          Write-Host "Contenido de $extractPath:"
          Get-ChildItem -Path $extractPath

          # Buscar la carpeta que contiene bin/sdkmanager.bat
          $sdkSource = Get-ChildItem -Path $extractPath -Directory -Recurse | Where-Object {
              Test-Path (Join-Path $_.FullName "bin\sdkmanager.bat")
          } | Select-Object -First 1

          if (-not $sdkSource) {
              Write-Host "No se encontró bin/sdkmanager.bat en el contenido extraído. Abortando."
              exit 1
          }

          Write-Host "Carpeta encontrada: $($sdkSource.FullName)"

          # Definir destino final: cmdline-tools\latest
          $latestDir = Join-Path $sdkRoot "cmdline-tools\latest"
          if (Test-Path $latestDir) {
              Remove-Item -Recurse -Force $latestDir
          }

          # Mover el contenido de la carpeta fuente al destino
          Write-Host "Moviendo $($sdkSource.FullName) a $latestDir"
          Move-Item -Path $sdkSource.FullName -Destination $latestDir

          $sdkManager = Join-Path $latestDir "bin\sdkmanager.bat"

          if (-not (Test-Path $sdkManager)) {
              Write-Host "No se encontró sdkmanager.bat después de mover. Abortando."
              exit 1
          }

          # Aceptar licencias
          Write-Host "Aceptando licencias..."
          cmd /c "(echo y & echo y & echo y & echo y & echo y & echo y & echo y & echo y) | `"$sdkManager`" --licenses"

          # Instalar plataforma Android 34
          Write-Host "Instalando plataforma android-34..."
          cmd /c "`"$sdkManager`" `"platforms;android-34`""

          # Establecer variables de entorno para pasos siguientes
          Write-Host "ANDROID_HOME=$sdkRoot" >> $env:GITHUB_ENV
          Write-Host "ANDROID_SDK_ROOT=$sdkRoot" >> $env:GITHUB_ENV

          Write-Host "Configuración de SDK de Android completada."

      - name: Restaurar dependencias .NET
        run: dotnet restore

      - name: Compilar aplicación Android
        run: dotnet build -c Release -f net8.0-android

      # Opcional: firmar y generar APK/AAB