name: Build Android (MAUI)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📥 Código
      - name: Checkout
        uses: actions/checkout@v4

      # 🔧 .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ☕ Java (necesario para Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      # 🔥 Instalar workloads MAUI
      - name: Install MAUI Workloads
        run: dotnet workload restore

      # 🧹 Limpieza REAL (PowerShell correcto)
      - name: Delete bin/obj
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Include bin,obj -Recurse -Directory | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Clean
        run: dotnet clean POPSManager.sln -c Release

      # 📦 Restore
      - name: Restore
        run: dotnet restore POPSManager.sln

      # 🔐 Decodificar Keystore
      - name: Decode Keystore
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
          $path = Join-Path $env:GITHUB_WORKSPACE "keystore.keystore"
          [IO.File]::WriteAllBytes($path, $bytes)

      # 🔨 Build APK firmado (SIN AndroidManifest manual ❗)
      - name: Publish APK
        shell: pwsh
        run: |
          $keystore = Join-Path $env:GITHUB_WORKSPACE "keystore.keystore"

          dotnet publish POPSManager.Android/POPSManager.Android.csproj `
            -c Release `
            -f net8.0-android `
            -p:RuntimeIdentifier=android-arm64 `
            -p:AndroidPackageFormat=apk `
            -p:BuildApk=true `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$keystore" `
            -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} `
            -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} `
            -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }}

      # 📦 Copiar APK firmado correcto
      - name: Copy APK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish

          $apk = Get-ChildItem -Recurse -Filter "*-Signed.apk" | Select-Object -First 1

          if ($apk) {
            Copy-Item $apk.FullName publish\
            Write-Host "APK listo: $($apk.FullName)"
          } else {
            throw "❌ No se encontró APK firmado"
          }

      # 📁 Subir artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: popsmanager-apk
          path: publish/*.apk

      # 🚀 Crear release automático
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: POPSManager Build v${{ github.run_number }}
          files: publish/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}