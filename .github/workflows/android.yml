name: Build Android (MAUI)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore NuGet packages
      run: dotnet restore

    # 🔐 Decodificar el keystore desde el secreto Base64
    - name: Decode keystore
      run: |
        echo "$env:KEYSTORE_BASE64" | base64 -d > popsmanager.keystore
      shell: pwsh

    # 🔨 Compilar y firmar el APK
    - name: Build Signed APK
      run: |
        dotnet publish POPSManager.Android/POPSManager.Android.csproj `
          -c Release `
          -f net8.0-android `
          /p:AndroidKeyStore=true `
          /p:AndroidSigningKeyStore=popsmanager.keystore `
          /p:AndroidSigningKeyAlias=$env:KEY_ALIAS `
          /p:AndroidSigningKeyPass=$env:KEY_PASSWORD `
          /p:AndroidSigningStorePass=$env:KEYSTORE_PASSWORD `
          --output ./publish

    # 📦 Subir el APK firmado como artefacto
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-Android-Signed
        path: publish/*.apk
