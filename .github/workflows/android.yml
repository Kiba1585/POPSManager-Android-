name: Build Android (MAUI)

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # -----------------------------------------------------------
    # 🔥 ELIMINAR .NET PREINSTALADO
    # -----------------------------------------------------------
    - name: Eliminar .NET preinstalado
      run: Remove-Item -Recurse -Force "C:\Program Files\dotnet"
      shell: pwsh

    # -----------------------------------------------------------
    # 🔧 CONFIGURAR .NET 8
    # -----------------------------------------------------------
    - name: Instalar SDK de .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Instalar carga de trabajo MAUI
      run: dotnet workload install maui

    # -----------------------------------------------------------
    # 📦⬇️ INSTALAR SDK DE ANDROID COMPLETO (cmdline-tools + plataforma 34)
    # -----------------------------------------------------------
    - name: Configurar Android SDK y aceptar licencias
      run: |
        $sdkRoot = "C:\Android\android-sdk"
        New-Item -ItemType Directory -Force -Path $sdkRoot
        
        # Descargar command-line tools de Google
        $zipUrl = "https://dl.google.com/android/repository/commandlinetools-win-12266719_latest.zip"
        $zipPath = "$env:TEMP\cmdline-tools.zip"
        $extractPath = "$env:TEMP\cmdline-tools-extract"
        
        Write-Host "Descargando Android SDK command-line tools..."
        Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
        
        Expand-Archive -Path $zipPath -DestinationPath $extractPath
        
        # Mover a la ubicación esperada por MAUI (cmdline-tools\latest)
        $latestDir = Join-Path $sdkRoot "cmdline-tools\latest"
        if (Test-Path $latestDir) { Remove-Item -Recurse -Force $latestDir }
        Move-Item -Path (Join-Path $extractPath "cmdline-tools\*") -Destination $latestDir
        
        $sdkManager = Join-Path $latestDir "bin\sdkmanager.bat"
        
        # Aceptar todas las licencias de forma automática
        Write-Host "Aceptando licencias..."
        cmd /c "(echo y & echo y & echo y & echo y & echo y & echo y & echo y & echo y) | `"$sdkManager`" --licenses"
        
        # Instalar plataforma Android 34 (necesaria para compilar)
        Write-Host "Instalando plataforma android-34..."
        cmd /c "`"$sdkManager`" `"platforms;android-34`""
        
        # Establecer variables de entorno para pasos siguientes
        Write-Host "ANDROID_HOME=$sdkRoot" >> $env:GITHUB_ENV
        Write-Host "ANDROID_SDK_ROOT=$sdkRoot" >> $env:GITHUB_ENV
      shell: pwsh

    # -----------------------------------------------------------
    # 🧹 LIMPIEZA TOTAL
    # -----------------------------------------------------------
    - name: Limpiar caché NuGet
      run: dotnet nuget locals all --clear

    - name: Eliminar carpetas bin/obj locales
      run: |
        Remove-Item -Recurse -Force POPSManager.Android\bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force POPSManager.Android\obj -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force POPSManager.Core\bin -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force POPSManager.Core\obj -ErrorAction SilentlyContinue
      shell: pwsh

    - name: Limpiar compilaciones anteriores
      run: dotnet clean POPSManager.sln --configuration Release

    # -----------------------------------------------------------
    # 🔍 ELIMINAR DUPLICADOS DE VIEWMODELS (si aplica)
    # -----------------------------------------------------------
    - name: Eliminar archivos duplicados de LogEntry y HomeViewModel
      run: |
        $oficial = "POPSManager.Android\ViewModels\HomeViewModel.cs"
        Get-ChildItem -Recurse -Filter *.cs -Path POPSManager.Android | ForEach-Object {
          $contenido = Get-Content $_.FullName -Raw
          if (($contenido -match "class LogEntry" -or $contenido -match "class HomeViewModel") -and ($_.FullName -notmatch [regex]::Escape($oficial))) {
            Write-Host "Eliminando archivo duplicado: $($_.FullName)"
            Remove-Item -Force $_.FullName
          }
        }
      shell: pwsh

    # -----------------------------------------------------------
    # 📦 RESTAURAR
    # -----------------------------------------------------------
    - name: Restaurar solución
      run: dotnet restore POPSManager.sln

    # -----------------------------------------------------------
    # 🔐 DECODIFICAR KEYSTORE
    # -----------------------------------------------------------
    - name: Decodificar Keystore
      run: |
        Write-Host "Procesando archivo de firmas..."
        $bytes = [System.Convert]::FromBase64String($env:KEYSTORE_BASE64)
        $keystorePath = Join-Path $env:GITHUB_WORKSPACE "popsmanager.keystore"
        [System.IO.File]::WriteAllBytes($keystorePath, $bytes)
        Write-Host "Archivo popsmanager.keystore generado en $keystorePath"
      shell: pwsh

    # -----------------------------------------------------------
    # 🔨 GENERAR APK FIRMADO (PUBLISH)
    # -----------------------------------------------------------
    - name: Generar APK firmado (publish)
      run: |
        $keystorePath = Join-Path $env:GITHUB_WORKSPACE "popsmanager.keystore"
        dotnet publish POPSManager.Android/POPSManager.Android.csproj `
          -c Release `
          -f net8.0-android `
          -r android-arm64 `
          /p:AndroidPackageFormat=apk `
          /p:AndroidKeyStore=true `
          /p:AndroidSigningKeyStore="$keystorePath" `
          /p:AndroidSigningKeyAlias=$env:KEY_ALIAS `
          /p:AndroidSigningKeyPass=$env:KEY_PASSWORD `
          /p:AndroidSigningStorePass=$env:KEYSTORE_PASSWORD
      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

    # -----------------------------------------------------------
    # 🔍 DIAGNÓSTICO (OPCIONAL)
    # -----------------------------------------------------------
    - name: Listar archivos generados
      run: |
        Write-Host "Buscando APKs y AABs..."
        Get-ChildItem -Path "POPSManager.Android\bin\Release\net8.0-android" -Recurse -Include *.apk,*.aab | ForEach-Object {
          Write-Host "Encontrado: $($_.FullName)"
        }
      shell: pwsh

    # -----------------------------------------------------------
    # 📁 COPIAR APK
    # -----------------------------------------------------------
    - name: Copiar APK generado
      run: |
        New-Item -ItemType Directory -Force -Path publish
        $apk = Get-ChildItem -Path "POPSManager.Android\bin\Release\net8.0-android" -Filter "*.apk" -Recurse | Select-Object -First 1
        if ($apk) {
          Copy-Item $apk.FullName publish\
          Write-Host "APK copiado: $($apk.FullName)"
        } else {
          Write-Host "No se encontró ningún APK en la carpeta de salida."
        }
      shell: pwsh

    # -----------------------------------------------------------
    # 📦 SUBIR ARTEFACTO
    # -----------------------------------------------------------
    - name: Subir artefacto APK
      uses: actions/upload-artifact@v4
      with:
        name: POPSManager-Android-Signed
        path: publish/**/*.apk

    # -----------------------------------------------------------
    # 🚀 CREAR RELEASE
    # -----------------------------------------------------------
    - name: Crear Release y subir APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "Android Build v${{ github.run_number }}"
        files: publish/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}